{{- if .Values.backup.enabled }}
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: {{ .Release.Name }}-object-store
  namespace: {{ .Release.Namespace }}
spec:
  configuration:
    destinationPath: s3://{{ .Values.backup.s3.bucket }}/
    {{- if .Values.backup.s3.endpointUrl }}
    endpointURL: {{ .Values.backup.s3.endpointUrl }}
    {{- end }}
    {{- if .Values.backup.endpointCA }}
    endpointCA:
      name: {{ .Values.backup.endpointCA.name }}
      key: {{ .Values.backup.endpointCA.key }}
    {{- end }}
    s3Credentials:
      accessKeyId:
        name: {{ .Values.backup.s3.credentialsSecretName }}
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: {{ .Values.backup.s3.credentialsSecretName }}
        key: ACCESS_SECRET_KEY
    wal:
      compression: gzip
      {{- if .Values.backup.walEncryption }}
      encryption: {{ .Values.backup.walEncryption }}
      {{- end }}
    data:
      compression: gzip
      {{- if .Values.backup.dataEncryption }}
      encryption: {{ .Values.backup.dataEncryption }}
      {{- end }}
      jobs: 2
  retentionPolicy: "{{ .Values.backup.retentionPolicy }}"
  {{- if .Values.backup.s3ChecksumCompatMode }}
  instanceSidecarConfiguration:
    env:
      - name: AWS_REQUEST_CHECKSUM_CALCULATION
        value: when_required
      - name: AWS_RESPONSE_CHECKSUM_VALIDATION
        value: when_required
  {{- end }}
{{ end }}




